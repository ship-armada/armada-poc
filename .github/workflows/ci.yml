name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast checks (no dependencies needed)
  anvil-address-check:
    name: Anvil Address Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-anvil-addresses.sh

  # TypeScript type-checking for config and relayer (non-Hardhat files)
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit --project tsconfig.ci.json

  # Hardhat compilation and full integration test suite
  hardhat:
    name: Hardhat Compile & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npm run compile
      - run: npm run test:all

  # Foundry fuzz and invariant tests
  forge:
    name: Forge Fuzz & Invariant Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge test

  # Contract size check (EIP-170 limit: 24576 bytes).
  # Reads Hardhat artifacts so the measured bytecode matches what actually deploys.
  contract-sizes:
    name: Contract Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npm run compile
      - run: npm run check:sizes

  # Slither static analysis (non-blocking until existing findings are triaged)
  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - uses: crytic/slither-action@v0.4.0
        with:
          slither-config: slither.config.json
          fail-on: none
