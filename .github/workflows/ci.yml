name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast checks (no dependencies needed)
  anvil-address-check:
    name: Anvil Address Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-anvil-addresses.sh

  # TypeScript type-checking for config and relayer (non-Hardhat files)
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit --project tsconfig.ci.json

  # Hardhat compilation and full integration test suite
  hardhat:
    name: Hardhat Compile & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npm run compile
      - run: npm run test:all

  # Foundry fuzz and invariant tests
  forge:
    name: Forge Fuzz & Invariant Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge test

  # Contract size check (EVM limit: 24576 bytes)
  contract-sizes:
    name: Contract Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Check contract sizes
        run: |
          OUTPUT=$(forge build --sizes 2>&1) || true
          echo "$OUTPUT"
          # Extract sizes and check for any contract exceeding 24576 bytes (24 KB EVM limit)
          OVERSIZED=$(echo "$OUTPUT" | awk -F'|' '
            NR > 2 && NF >= 4 {
              gsub(/^[ \t]+|[ \t]+$/, "", $2)  # contract name
              gsub(/^[ \t]+|[ \t]+$/, "", $3)  # size
              if ($3+0 > 24576 && $2 != "") print $2 " (" $3 " bytes)"
            }
          ')
          if [[ -n "$OVERSIZED" ]]; then
            echo ""
            echo "ERROR: The following contracts exceed the 24576-byte EVM size limit:"
            echo "$OVERSIZED"
            exit 1
          fi
          echo "All contracts within size limits."

  # Halmos symbolic verification
  halmos:
    name: Halmos Symbolic Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install halmos
      - run: halmos
