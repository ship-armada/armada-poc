[profile.default]
src = "contracts"
test = "test-foundry"
out = "forge-out"
libs = ["node_modules", "lib"]

# Solidity config matching hardhat.config.ts
solc_version = "0.8.17"
evm_version = "london"

# Remappings for OpenZeppelin
remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
]

# Invariant test config
[invariant]
runs = 256
depth = 50
fail_on_revert = false
